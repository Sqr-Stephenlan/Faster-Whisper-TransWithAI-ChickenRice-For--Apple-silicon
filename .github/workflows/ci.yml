name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR to avoid piling up expensive builds.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify macOS source build
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip
        cache-dependency-path: |
          requirements-macos.txt
          requirements-dev.txt
          constraints-macos-arm64.txt

    - name: Install runtime and development dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt -c constraints-macos-arm64.txt

    - name: Ruff lint
      run: python -m ruff check .

    - name: Ruff format check
      run: python -m ruff format --check .

    - name: Mypy type-check
      run: python -m mypy --config-file pyproject.toml src infer.py download_models.py modal_infer.py scripts

    - name: Unit tests
      run: python -m pytest

    - name: Bytecode compile check
      run: python -m compileall -q infer.py download_models.py modal_infer.py scripts src tests
